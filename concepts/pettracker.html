<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetTracker - Pet Registry</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link href="/assets/base.min.css" rel="stylesheet">
    <script src="/assets/alpinejs.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">PetTracker</h1>
            <p class="text-gray-600">Pet Registry with Solana Token Accounts</p>
        </header>

        <div x-data="petTracker()" class="space-y-8">
            <!-- Registration Form -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Register a New Pet</h2>
                <form @submit.prevent="registerPet" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Pet Name</label>
                            <input x-model="newPet.name" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Species</label>
                            <input x-model="newPet.species" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Breed</label>
                            <input x-model="newPet.breed" type="text" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Age</label>
                            <input x-model="newPet.age" type="number" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Owner Solana Wallet</label>
                        <div class="flex gap-2 items-center flex-wrap">
                            <button 
                                type="button"
                                @click="showWalletModal = true"
                                :class="ownerAddress ? 'bg-green-600 hover:bg-green-700' : 'bg-indigo-600 hover:bg-indigo-700'"
                                class="text-white px-4 py-2 rounded-md transition-colors">
                                <span x-show="!ownerAddress">Connect Wallet</span>
                                <span x-show="ownerAddress" x-text="'Connected: ' + ownerAddress.substring(0, 6) + '...' + ownerAddress.substring(ownerAddress.length - 4)"></span>
                            </button>
                            <button 
                                type="button"
                                x-show="ownerAddress"
                                @click="disconnectWallet"
                                class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">
                                Disconnect
                            </button>
                        </div>
                        <input x-model="ownerAddress" type="hidden">
                        <p x-show="!ownerAddress" class="text-sm text-gray-500 mt-2">Please connect your wallet to register a pet</p>
                        <p x-show="ownerAddress" class="text-sm text-gray-600 mt-2 font-mono break-all" x-text="'Wallet: ' + ownerAddress"></p>
                    </div>
                    <div>
                        <button type="submit" :disabled="!ownerAddress" :class="!ownerAddress ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-700'" class="bg-indigo-600 text-white px-4 py-2 rounded-md">Register Pet</button>
                    </div>
                </form>
            </section>

            <!-- Wallet Modal -->
            <div x-show="showWalletModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="showWalletModal = false">
                <div class="bg-white rounded-lg shadow-lg p-6 max-w-md w-full mx-4">
                    <h3 class="text-xl font-bold mb-4">Select a Wallet</h3>
                    <div class="space-y-2 mb-4">
                        <template x-for="wallet in availableWallets" :key="wallet.id">
                            <button
                                type="button"
                                @click="connectToWallet(wallet)"
                                class="w-full text-left px-4 py-3 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors flex items-center justify-between">
                                <span x-text="wallet.name"></span>
                                <span x-show="wallet.connected" class="text-green-600 text-sm">✓ Installed</span>
                                <span x-show="!wallet.connected" class="text-gray-400 text-sm">Not found</span>
                            </button>
                        </template>
                    </div>
                    <div class="border-t pt-4">
                        <p class="text-sm text-gray-600 mb-3">Or enter a Solana address manually:</p>
                        <input 
                            x-model="manualAddress"
                            type="text"
                            placeholder="Enter Solana address"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md mb-3"
                        >
                        <div class="flex gap-2">
                            <button
                                @click="connectManually"
                                class="flex-1 bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">
                                Connect
                            </button>
                            <button
                                @click="showWalletModal = false"
                                class="flex-1 bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pet List -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Registered Pets</h2>
                <div class="mb-4">
                    <button @click="loadPets" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700">Refresh List</button>
                </div>
                <div x-show="pets.length === 0" class="text-gray-500">
                    No pets registered yet.
                </div>
                <div x-show="pets.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="pet in pets" :key="pet.id">
                        <div class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                            <h3 class="text-xl font-bold" x-text="pet.name"></h3>
                            <p class="text-gray-600" x-text="`${pet.species} - ${pet.breed || 'Unknown breed'}`"></p>
                            <p class="text-gray-500 text-sm" x-text="`Age: ${pet.age || 'Unknown'}`"></p>
                            <p class="text-gray-500 text-sm mt-2" x-text="`Owner: ${pet.owner.substring(0, 6)}...${pet.owner.substring(pet.owner.length - 4)}`"></p>
                            <p class="text-gray-500 text-sm" x-text="`Token ID: ${pet.tokenId}`"></p>
                            <div class="mt-4 flex space-x-2">
                                <button @click="loadPet(pet.id)" class="text-indigo-600 hover:text-indigo-800 text-sm">View Details</button>
                                <button @click="deletePet(pet.id)" class="text-red-600 hover:text-red-800 text-sm">Delete</button>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>
    </div>

    <script>
        function petTracker() {
            return {
                pets: [],
                newPet: {
                    id: '',
                    name: '',
                    species: '',
                    breed: '',
                    age: ''
                },
                ownerAddress: '',
                showWalletModal: false,
                manualAddress: '',
                availableWallets: [],
                
                async init() {
                    await this.detectWallets();
                    this.checkStoredWallet();
                    this.loadPets();
                },
                
                async detectWallets() {
                    // Detect installed Solana wallets
                    this.availableWallets = [
                        { 
                            id: 'phantom', 
                            name: 'Phantom',
                            connected: typeof window !== 'undefined' && !!window.phantom?.solana
                        },
                        { 
                            id: 'solflare',
                            name: 'Solflare',
                            connected: typeof window !== 'undefined' && !!window.solflare
                        },
                        { 
                            id: 'metaplex',
                            name: 'Metaplex',
                            connected: typeof window !== 'undefined' && !!window.metaplex?.solana
                        }
                    ];
                },
                
                checkStoredWallet() {
                    // Check if user previously connected a wallet
                    const stored = localStorage.getItem('solana_wallet_address');
                    if (stored) {
                        this.ownerAddress = stored;
                    }
                },
                
                async connectToWallet(wallet) {
                    try {
                        let provider = null;
                        
                        switch(wallet.id) {
                            case 'phantom':
                                provider = window.phantom?.solana;
                                break;
                            case 'solflare':
                                provider = window.solflare;
                                break;
                            case 'metaplex':
                                provider = window.metaplex?.solana;
                                break;
                        }
                        
                        if (!provider) {
                            alert(`${wallet.name} not found. Please install it from their official website.`);
                            return;
                        }
                        
                        console.log(`Attempting to connect to ${wallet.name}...`);
                        
                        // Close modal immediately to show we're processing
                        this.showWalletModal = false;
                        
                        // Create a timeout promise that will reject after 10 seconds
                        const timeoutPromise = new Promise((_, reject) => {
                            setTimeout(() => {
                                reject(new Error(`${wallet.name} connection timed out. Try:\n1. Unlocking ${wallet.name}\n2. Refreshing the page\n3. Checking if ${wallet.name} extension is enabled`));
                            }, 10000);
                        });
                        
                        console.log('Making connection request...');
                        
                        // Race between the actual connect call and timeout
                        const response = await Promise.race([
                            provider.connect({ onlyIfTrusted: false }),
                            timeoutPromise
                        ]);
                        
                        console.log('Connection response:', response);
                        
                        // Extract public key
                        const publicKey = response?.publicKey?.toString?.() || provider.publicKey?.toString();
                        
                        if (!publicKey) {
                            throw new Error('Could not get wallet address from Phantom');
                        }
                        
                        this.ownerAddress = publicKey;
                        localStorage.setItem('solana_wallet_address', publicKey);
                        this.manualAddress = '';
                        
                        console.log('Successfully connected:', publicKey);
                        alert(`Connected to ${wallet.name}!\n${publicKey}`);
                        
                    } catch (error) {
                        console.error('Connection error:', error);
                        this.showWalletModal = true; // Show modal again so they can try again
                        alert(`Connection failed: ${error.message}`);
                    }
                },
                
                connectManually() {
                    if (!this.manualAddress.trim()) {
                        alert('Please enter a valid Solana address');
                        return;
                    }
                    
                    // Basic validation for Solana address format (base58, 32-44 chars)
                    if (!/^[1-9A-HJ-NP-Z]{32,44}$/.test(this.manualAddress.trim())) {
                        alert('Invalid Solana address format');
                        return;
                    }
                    
                    this.ownerAddress = this.manualAddress.trim();
                    localStorage.setItem('solana_wallet_address', this.ownerAddress);
                    this.showWalletModal = false;
                    this.manualAddress = '';
                    
                    console.log('Connected with manual address:', this.ownerAddress);
                },
                
                disconnectWallet() {
                    if (confirm('Disconnect wallet?')) {
                        this.ownerAddress = '';
                        localStorage.removeItem('solana_wallet_address');
                    }
                },
                
                async loadPets() {
                    try {
                        const response = await fetch('/api/v1/pettracker/list');
                        if (response.ok) {
                            this.pets = await response.json();
                        } else {
                            console.error('Failed to load pets');
                        }
                    } catch (error) {
                        console.error('Error loading pets:', error);
                    }
                },
                
                async registerPet() {
                    if (!this.ownerAddress) {
                        alert('Please connect your wallet first');
                        return;
                    }
                    
                    // Generate a simple ID for demo purposes
                    const petId = 'pet_' + Date.now();
                    
                    const petData = {
                        ...this.newPet,
                        id: petId
                    };
                    
                    try {
                        const response = await fetch('/api/v1/pettracker/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                petData: petData,
                                ownerAddress: this.ownerAddress
                            })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            console.log('Pet registered:', result);
                            this.resetForm();
                            this.loadPets();
                            alert('Pet registered successfully!');
                        } else {
                            const error = await response.json();
                            console.error('Failed to register pet:', error);
                            alert('Failed to register pet: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error registering pet:', error);
                        alert('Error registering pet: ' + error.message);
                    }
                },
                
                async loadPet(id) {
                    try {
                        const response = await fetch(`/api/v1/pettracker/get?id=${id}`);
                        if (response.ok) {
                            const pet = await response.json();
                            alert(`Pet Details:\nName: ${pet.name}\nSpecies: ${pet.species}\nBreed: ${pet.breed || 'N/A'}\nAge: ${pet.age || 'N/A'}`);
                        } else {
                            const error = await response.json();
                            alert('Failed to load pet: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error loading pet:', error);
                        alert('Error loading pet: ' + error.message);
                    }
                },
                
                async deletePet(id) {
                    if (!confirm('Are you sure you want to delete this pet?')) {
                        return;
                    }
                    
                    try {
                        const response = await fetch('/api/v1/pettracker/delete', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                id: id,
                                ownerAddress: this.ownerAddress
                            })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            console.log('Pet deleted:', result);
                            this.loadPets();
                            alert('Pet deleted successfully!');
                        } else {
                            const error = await response.json();
                            console.error('Failed to delete pet:', error);
                            alert('Failed to delete pet: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error deleting pet:', error);
                        alert('Error deleting pet: ' + error.message);
                    }
                },
                
                resetForm() {
                    this.newPet = {
                        id: '',
                        name: '',
                        species: '',
                        breed: '',
                        age: ''
                    };
                }
            }
        }
    </script>
</body>
</html>
