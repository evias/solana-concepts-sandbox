<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetTracker - Pet Registry</title>
    <link href="/assets/base.min.css" rel="stylesheet">
    <script src="/assets/alpinejs.min.js" defer></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">PetTracker</h1>
            <p class="text-gray-600">Pet Registry with Solana Token Accounts</p>
        </header>

        <div x-data="petTracker()" class="space-y-8">
            <!-- Registration Form -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Register a New Pet</h2>
                <form @submit.prevent="registerPet" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Pet Name</label>
                            <input x-model="newPet.name" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Species</label>
                            <input x-model="newPet.species" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Breed</label>
                            <input x-model="newPet.breed" type="text" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Age</label>
                            <input x-model="newPet.age" type="number" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Owner Solana Address</label>
                        <input x-model="ownerAddress" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                    </div>
                    <div>
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Register Pet</button>
                    </div>
                </form>
            </section>

            <!-- Pet List -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Registered Pets</h2>
                <div class="mb-4">
                    <button @click="loadPets" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700">Refresh List</button>
                </div>
                <div x-show="pets.length === 0" class="text-gray-500">
                    No pets registered yet.
                </div>
                <div x-show="pets.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="pet in pets" :key="pet.id">
                        <div class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                            <h3 class="text-xl font-bold" x-text="pet.name"></h3>
                            <p class="text-gray-600" x-text="`${pet.species} - ${pet.breed || 'Unknown breed'}`"></p>
                            <p class="text-gray-500 text-sm" x-text="`Age: ${pet.age || 'Unknown'}`"></p>
                            <p class="text-gray-500 text-sm mt-2" x-text="`Owner: ${pet.owner.substring(0, 6)}...${pet.owner.substring(pet.owner.length - 4)}`"></p>
                            <p class="text-gray-500 text-sm" x-text="`Token ID: ${pet.tokenId}`"></p>
                            <div class="mt-4 flex space-x-2">
                                <button @click="loadPet(pet.id)" class="text-indigo-600 hover:text-indigo-800 text-sm">View Details</button>
                                <button @click="deletePet(pet.id)" class="text-red-600 hover:text-red-800 text-sm">Delete</button>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>
    </div>

    <script>
        function petTracker() {
            return {
                pets: [],
                newPet: {
                    id: '',
                    name: '',
                    species: '',
                    breed: '',
                    age: ''
                },
                ownerAddress: '',
                
                async init() {
                    this.loadPets();
                },
                
                async loadPets() {
                    try {
                        const response = await fetch('/api/v1/pettracker/list');
                        if (response.ok) {
                            this.pets = await response.json();
                        } else {
                            console.error('Failed to load pets');
                        }
                    } catch (error) {
                        console.error('Error loading pets:', error);
                    }
                },
                
                async registerPet() {
                    // Generate a simple ID for demo purposes
                    const petId = 'pet_' + Date.now();
                    
                    const petData = {
                        id: petId,
                        ...this.newPet
                    };
                    
                    try {
                        const response = await fetch('/api/v1/pettracker/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                petData: petData,
                                ownerAddress: this.ownerAddress
                            })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            console.log('Pet registered:', result);
                            this.resetForm();
                            this.loadPets();
                        } else {
                            const error = await response.json();
                            console.error('Failed to register pet:', error);
                            alert('Failed to register pet: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error registering pet:', error);
                        alert('Error registering pet: ' + error.message);
                    }
                },
                
                async loadPet(id) {
                    try {
                        const response = await fetch(`/api/v1/pettracker/get?id=${id}`);
                        if (response.ok) {
                            const pet = await response.json();
                            alert(`Pet Details:\nName: ${pet.name}\nSpecies: ${pet.species}\nBreed: ${pet.breed || 'N/A'}\nAge: ${pet.age || 'N/A'}`);
                        } else {
                            const error = await response.json();
                            alert('Failed to load pet: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error loading pet:', error);
                        alert('Error loading pet: ' + error.message);
                    }
                },
                
                async deletePet(id) {
                    if (!confirm('Are you sure you want to delete this pet?')) {
                        return;
                    }
                    
                    try {
                        const response = await fetch('/api/v1/pettracker/delete', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                id: id,
                                ownerAddress: this.ownerAddress
                            })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            console.log('Pet deleted:', result);
                            this.loadPets();
                        } else {
                            const error = await response.json();
                            console.error('Failed to delete pet:', error);
                            alert('Failed to delete pet: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error deleting pet:', error);
                        alert('Error deleting pet: ' + error.message);
                    }
                },
                
                resetForm() {
                    this.newPet = {
                        id: '',
                        name: '',
                        species: '',
                        breed: '',
                        age: ''
                    };
                }
            }
        }
    </script>
</body>
</html>
