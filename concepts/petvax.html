<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetVax - Vaccination Records</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link href="/assets/base.min.css" rel="stylesheet">
    <script src="/assets/alpinejs.min.js" defer></script>
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .prose {
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .prose h1 {
            font-size: 1.875rem;
            font-weight: bold;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }
        .prose h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .prose h3 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        .prose p {
            margin-bottom: 1rem;
        }
        .prose ul, .prose ol {
            margin-bottom: 1rem;
            margin-left: 1.5rem;
        }
        .prose li {
            margin-bottom: 0.25rem;
        }
        .prose code {
            background-color: #f3f4f6;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: monospace;
            font-size: 0.9rem;
            color: #dc2626;
        }
        .prose pre {
            background-color: #1f2937;
            color: #f3f4f6;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        .prose pre code {
            background-color: transparent;
            color: #f3f4f6;
            padding: 0;
        }
        .prose blockquote {
            border-left: 4px solid #d1d5db;
            padding-left: 1rem;
            margin-left: 0;
            color: #6b7280;
            font-style: italic;
        }
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        .prose table td, .prose table th {
            border: 1px solid #d1d5db;
            padding: 0.5rem;
        }
        .prose table th {
            background-color: #f3f4f6;
            font-weight: bold;
        }
        .prose a {
            color: #3b82f6;
            text-decoration: underline;
        }
        .prose a:hover {
            color: #1d4ed8;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8" x-data="petVax()">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">PetVax</h1>
                <p class="text-gray-600">Vaccination Records for Registered Pets</p>
            </div>
            <button @click="openDocumentation()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                📚 Documentation
            </button>
        </header>

        <!-- Documentation Modal -->
        <div x-show="showDocumentation" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" @click.self="showDocumentation = false">
            <div class="bg-white rounded-lg shadow-lg max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center">
                    <h2 class="text-2xl font-bold">PetVax Documentation</h2>
                    <button
                        @click="showDocumentation = false"
                        class="text-gray-500 hover:text-gray-700 text-2xl">
                        ✕
                    </button>
                </div>
                <div class="p-6 prose prose-sm max-w-none" x-html="documentationContent"></div>
            </div>
        </div>

        <div class="space-y-8">
            <!-- Wallet Connection -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Connect Account</h2>
                <div class="flex gap-2 items-center flex-wrap">
                    <button 
                        type="button"
                        @click="showWalletModal = true"
                        :class="userAddress ? 'bg-green-600 hover:bg-green-700' : 'bg-indigo-600 hover:bg-indigo-700'"
                        class="text-white px-4 py-2 rounded-md transition-colors">
                        <span x-show="!userAddress">Connect Wallet</span>
                        <span x-show="userAddress" x-text="'Connected: ' + userAddress.substring(0, 6) + '...' + userAddress.substring(userAddress.length - 4)"></span>
                    </button>
                    <button 
                        type="button"
                        x-show="userAddress"
                        @click="disconnectWallet"
                        class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">
                        Disconnect
                    </button>
                </div>
                <p x-show="!userAddress" class="text-sm text-gray-500 mt-2">Connect your wallet to record or verify vaccinations</p>
                <p x-show="userAddress" class="text-sm text-gray-600 mt-2 font-mono break-all" x-text="'Your Account: ' + userAddress"></p>
            </section>

            <!-- Select Pet -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Select a Pet</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Available Pets</label>
                        <select x-model="selectedPetId" @change="loadSelectedPet()" class="block w-full max-w-md rounded-md border-gray-300 shadow-sm">
                            <option value="">-- Choose a pet --</option>
                            <template x-for="pet in availablePets" :key="pet.id">
                                <option :value="pet.id" x-text="`${pet.name} (${pet.species})`"></option>
                            </template>
                        </select>
                    </div>
                    <div x-show="selectedPet" class="bg-blue-50 border border-blue-200 rounded-md p-4">
                        <p class="font-semibold text-blue-900" x-text="selectedPet ? `${selectedPet.name} - ${selectedPet.species} (${selectedPet.breed || 'Unknown'})` : ''"></p>
                        <p class="text-sm text-blue-700" x-text="selectedPet ? `Owner: ${selectedPet.owner.substring(0, 6)}...${selectedPet.owner.substring(selectedPet.owner.length - 4)}` : ''"></p>
                    </div>
                </div>
            </section>

            <!-- Record Vaccination -->
            <section class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Record Vaccination</h2>
                <form @submit.prevent="recordVaccination" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Vaccine Name</label>
                            <input x-model="vaccinationForm.vaccineName" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" placeholder="e.g., Rabies, DPPE">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Vaccination Date</label>
                            <input x-model="vaccinationForm.vaccinationDate" type="date" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Veterinary Clinic Address (Solana Wallet)</label>
                        <input x-model="vaccinationForm.vetAddress" type="text" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" placeholder="Solana address">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Notes</label>
                        <textarea x-model="vaccinationForm.notes" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50" rows="3" placeholder="Optional notes about the vaccination"></textarea>
                    </div>
                    <button 
                        type="submit" 
                        :disabled="!selectedPetId || !userAddress"
                        :class="!selectedPetId || !userAddress ? 'opacity-50 cursor-not-allowed' : 'hover:bg-green-700'"
                        class="bg-green-600 text-white px-4 py-2 rounded-md">
                        Record Vaccination
                    </button>
                </form>
            </section>

            <!-- Verify Vaccinations -->
            <section x-show="selectedPet" class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-4">Vaccination History</h2>
                <div class="mb-4">
                    <button @click="loadVaccinationHistory()" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700">Refresh History</button>
                </div>
                <div x-show="vaccinations.length === 0" class="text-gray-500">
                    No vaccinations recorded yet for this pet.
                </div>
                <div x-show="vaccinations.length > 0" class="space-y-4">
                    <template x-for="vax in vaccinations" :key="vax.id">
                        <div class="border rounded-lg p-4 bg-green-50 border-green-200">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-lg font-bold text-green-900" x-text="vax.vaccine_name"></h3>
                                    <p class="text-sm text-green-700" x-text="'Date: ' + new Date(vax.vaccination_date).toLocaleDateString()"></p>
                                </div>
                                <span class="bg-green-600 text-white px-3 py-1 rounded-full text-xs font-semibold">✓ Verified</span>
                            </div>
                            <p class="text-sm text-green-600 mb-2" x-text="'Recorded by: ' + vax.vet_address.substring(0, 6) + '...' + vax.vet_address.substring(vax.vet_address.length - 4)"></p>
                            <p x-show="vax.notes" class="text-sm text-green-700 italic" x-text="'Notes: ' + vax.notes"></p>
                        </div>
                    </template>
                </div>
            </section>

            <!-- Wallet Modal -->
            <div x-show="showWalletModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-40 p-4" @click.self="showWalletModal = false">
                <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-6">
                    <h2 class="text-2xl font-bold mb-4">Connect Wallet</h2>
                    <div class="space-y-3 mb-6">
                        <button @click="connectPhantom()" class="w-full bg-purple-600 text-white px-4 py-3 rounded-md hover:bg-purple-700 font-semibold">
                            🎭 Connect Phantom
                        </button>
                    </div>
                    <div class="border-t pt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Or enter address manually:</label>
                        <input x-model="manualAddress" type="text" placeholder="Solana address" class="block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 mb-3">
                        <button @click="connectManually()" class="w-full bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">
                            Connect
                        </button>
                    </div>
                    <button @click="showWalletModal = false" class="w-full mt-4 bg-gray-300 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-400">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function petVax() {
            return {
                userAddress: '',
                showWalletModal: false,
                showDocumentation: false,
                manualAddress: '',
                availablePets: [],
                selectedPetId: '',
                selectedPet: null,
                vaccinations: [],
                documentationContent: '',
                vaccinationForm: {
                    vaccineName: '',
                    vaccinationDate: '',
                    vetAddress: '',
                    notes: ''
                },
                
                async init() {
                    await this.detectWallets();
                    this.checkStoredWallet();
                    await this.loadPets();
                },
                
                async detectWallets() {
                    // Detection logic for Phantom
                    if (window.solana && window.solana.isPhantom) {
                        console.log('Phantom wallet detected');
                    }
                },
                
                checkStoredWallet() {
                    const stored = localStorage.getItem('petvax_wallet');
                    if (stored) {
                        this.userAddress = stored;
                    }
                },
                
                async connectPhantom() {
                    try {
                        if (!window.solana) {
                            alert('Phantom wallet not installed. Please install it from https://phantom.app');
                            return;
                        }
                        const response = await window.solana.connect();
                        this.userAddress = response.publicKey.toString();
                        localStorage.setItem('petvax_wallet', this.userAddress);
                        this.showWalletModal = false;
                        console.log('Connected to Phantom:', this.userAddress);
                    } catch (error) {
                        console.error('Error connecting to Phantom:', error);
                        alert('Failed to connect Phantom: ' + error.message);
                    }
                },
                
                connectManually() {
                    if (!this.manualAddress) {
                        alert('Please enter a Solana address');
                        return;
                    }
                    // Basic address validation
                    if (this.manualAddress.length < 32) {
                        alert('Invalid Solana address');
                        return;
                    }
                    this.userAddress = this.manualAddress;
                    localStorage.setItem('petvax_wallet', this.userAddress);
                    this.showWalletModal = false;
                    this.manualAddress = '';
                },
                
                disconnectWallet() {
                    this.userAddress = '';
                    this.selectedPetId = '';
                    this.selectedPet = null;
                    this.vaccinations = [];
                    localStorage.removeItem('petvax_wallet');
                },
                
                async loadPets() {
                    try {
                        const response = await fetch('/api/v1/pettracker/list');
                        if (response.ok) {
                            this.availablePets = await response.json();
                        } else {
                            alert('Failed to load pets');
                        }
                    } catch (error) {
                        console.error('Error loading pets:', error);
                    }
                },
                
                async loadSelectedPet() {
                    if (!this.selectedPetId) {
                        this.selectedPet = null;
                        this.vaccinations = [];
                        return;
                    }
                    
                    try {
                        const response = await fetch(`/api/v1/pettracker/get?id=${this.selectedPetId}`);
                        if (response.ok) {
                            this.selectedPet = await response.json();
                            await this.loadVaccinationHistory();
                        } else {
                            alert('Failed to load pet');
                        }
                    } catch (error) {
                        console.error('Error loading pet:', error);
                    }
                },
                
                async loadVaccinationHistory() {
                    if (!this.selectedPetId) return;
                    
                    try {
                        const response = await fetch(`/api/v1/petvax/pet?petId=${this.selectedPetId}`);
                        if (response.ok) {
                            const data = await response.json();
                            this.vaccinations = data.vaccinations;
                        }
                    } catch (error) {
                        console.error('Error loading vaccination history:', error);
                    }
                },
                
                async recordVaccination() {
                    if (!this.selectedPetId) {
                        alert('Please select a pet');
                        return;
                    }
                    
                    if (!this.userAddress) {
                        alert('Please connect your wallet');
                        return;
                    }
                    
                    try {
                        const response = await fetch('/api/v1/petvax/record', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                petId: this.selectedPetId,
                                vaccineName: this.vaccinationForm.vaccineName,
                                vaccinationDate: this.vaccinationForm.vaccinationDate,
                                vetAddress: this.vaccinationForm.vetAddress,
                                notes: this.vaccinationForm.notes
                            })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            console.log('Vaccination recorded:', result);
                            this.vaccinationForm = {
                                vaccineName: '',
                                vaccinationDate: '',
                                vetAddress: '',
                                notes: ''
                            };
                            await this.loadVaccinationHistory();
                            alert('Vaccination recorded successfully!');
                        } else {
                            const error = await response.json();
                            alert('Failed to record vaccination: ' + error.error);
                        }
                    } catch (error) {
                        console.error('Error recording vaccination:', error);
                        alert('Error: ' + error.message);
                    }
                },
                
                async openDocumentation() {
                    try {
                        const response = await fetch('/concepts/docs/petvax.md');
                        if (response.ok) {
                            const markdown = await response.text();
                            this.documentationContent = marked.parse(markdown);
                            this.showDocumentation = true;
                        }
                    } catch (error) {
                        console.error('Error loading documentation:', error);
                        alert('Failed to load documentation');
                    }
                }
            };
        }
    </script>
</body>
</html>
