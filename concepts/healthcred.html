<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCred - Healthcare Worker Credentials</title>
    <link rel="stylesheet" href="/assets/base.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header with back button and documentation -->
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="/" class="inline-flex items-center text-blue-600 hover:text-blue-700">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                        Back
                    </a>
                    <h1 class="text-2xl font-bold text-gray-900">HealthCred</h1>
                </div>
                <a href="/concepts/docs/healthcred.md" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-700 text-sm font-medium">
                    📖 Documentation
                </a>
            </div>
        </header>

        <!-- Wallet Connection -->
        <div class="bg-white border-b" x-data="walletConnection()" @load.window="init()">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <button @click="connect()" v-if="!walletAddress" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">
                    <span v-if="!connecting">Connect Wallet</span>
                    <span v-else>Connecting...</span>
                </button>
                <div v-else class="flex items-center gap-2">
                    <span class="text-sm text-gray-600">Connected:</span>
                    <code class="bg-gray-100 px-3 py-1 rounded text-sm font-mono" @click="copy" style="cursor: pointer;" title="Click to copy">
                        <span x-text="walletAddress.slice(0, 6) + '...' + walletAddress.slice(-6)"></span>
                    </code>
                    <button @click="disconnect()" class="text-red-600 hover:text-red-700 text-sm ml-2">Disconnect</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8" x-data=" HealthCredApp()">
            <!-- Registration Form -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-bold mb-4">Register Healthcare Credential</h2>
                <form @submit.prevent="registerCredential()" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
                            <input 
                                x-model="form.fullName" 
                                type="text" 
                                required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline- none focus:ring-2 focus:ring-blue-500"
                                placeholder="Dr. Jane Smith"
                            >
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth *</label>
                            <input 
                                x-model="form.dateOfBirth" 
                                type="date" 
                                required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address *</label>
                            <input 
                                x-model="form.email" 
                                type="email" 
                                required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="jane@healthcare.com"
                            >
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Profession *</label>
                            <input 
                                x-model="form.profession" 
                                type="text" 
                                required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="e.g.: Dentist or Nurse"
                            >
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">DID Document JSON *</label>
                        <textarea 
                            x-model="form.didDocument" 
                            required
                            rows="6"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                            placeholder='{"id":"did:example:123","authentication":["key-1"]}'
                        ></textarea>
                        <p class="text-xs text-gray-500 mt-1">Must be valid JSON with "id" and "authentication" fields</p>
                    </div>

                    <button 
                        @click="submitRegistration()"
                        :disabled="!walletAddress || !form.fullName || !form.email || !form.profession || !form.didDocument"
                        class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span x-show="!registering">Register Credential</span>
                        <span x-show="registering">Registering...</span>
                    </button>

                    <div v-show="registerError" class="bg-red-100 text-red-700 p-3 rounded">
                        <span x-text="registerError"></span>
                    </div>
                </form>
            </div>

            <!-- Upload Certification Form -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-xl font-bold mb-4">Upload a Certification</h2>
                <form @submit.prevent="uploadCertification()" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Credential *</label>
                            <select 
                                x-model="certForm.credentialId"
                                required
                                :disabled="!walletAddress"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="">Select credential...</option>
                                <template x-for="cred in credentials" :key="cred.id">
                                    <option :value="cred.id" x-text="`${cred.full_name} (${cred.profession})`"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">File *</label>
                            <input 
                                @change="onCertFileSelected"
                                type="file" 
                                accept="application/pdf,image/png,image/jpeg"
                                required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                            >
                            <p class="text-xs text-gray-500 mt-1">Accepted: PDF, PNG, JPG</p>
                        </div>
                    </div>

                    <button 
                        @click="submitCertification()"
                        :disabled="!walletAddress || !certForm.credentialId || !certForm.file"
                        class="w-full bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <span x-show="!uploadingCert">Upload Certification</span>
                        <span x-show="uploadingCert">Uploading...</span>
                    </button>

                    <div v-show="certError" class="bg-red-100 text-red-700 p-3 rounded">
                        <span x-text="certError"></span>
                    </div>
                </form>
            </div>

            <!-- Credentials Listing -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Registered Credentials</h2>
                    <button @click="loadCredentials()" class="text-blue-600 hover:text-blue-700 text-sm">
                        🔄 Refresh
                    </button>
                </div>

                <div v-if="loading" class="text-center py-8">
                    <p class="text-gray-500">Loading credentials...</p>
                </div>

                <div v-else-if="credentials.length === 0" class="text-center py-8 text-gray-500">
                    <p>No credentials registered yet</p>
                </div>

                <div v-else class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <template x-for="cred in credentials" :key="cred.id">
                        <div class="border border-gray-200 rounded-lg p-4 hover:shadow-lg transition">
                            <div class="font-semibold text-lg mb-2" x-text="cred.full_name"></div>
                            <div class="text-sm text-gray-600 mb-3">
                                <div x-text="`${cred.profession}`"></div>
                                <div x-text="`${cred.email}`" class="text-xs"></div>
                            </div>
                            <div class="flex gap-2">
                                <button 
                                    @click="openBadgeModal(cred.id)"
                                    class="flex-1 bg-yellow-500 text-white px-2 py-1 rounded text-sm hover:bg-yellow-600 transition"
                                >
                                    🎖️ Send Badge
                                </button>
                                <button 
                                    @click="viewCredentialDetails(cred.id)"
                                    class="flex-1 bg-gray-500 text-white px-2 py-1 rounded text-sm hover:bg-gray-600 transition"
                                >
                                    View Details
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Pagination -->
                <div v-if="pagination.total > pagination.limit" class="flex justify-center gap-2 mt-4">
                    <button 
                        @click="loadCredentials(Math.max(0, pagination.offset - pagination.limit))"
                        :disabled="pagination.offset === 0"
                        class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-50"
                    >
                        ← Previous
                    </button>
                    <span class="px-3 py-1" x-text="`Page ${Math.floor(pagination.offset / pagination.limit) + 1}`"></span>
                    <button 
                        @click="loadCredentials(pagination.offset + pagination.limit)"
                        :disabled="!pagination.hasMore"
                        class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-50"
                    >
                        Next →
                    </button>
                </div>
            </div>
        </main>

        <!-- Badge Modal -->
        <div x-show="showBadgeModal" @click.self="showBadgeModal = false" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
            <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
                <h3 class="text-lg font-bold mb-4">Send a Badge</h3>
                <form @submit.prevent="submitBadge()" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Select Emoji *</label>
                        <div class="grid grid-cols-5 gap-2">
                            <template x-for="emoji in ['⭐', '💯', '🏆', '🎖️', '👑', '✨', '🌟', '🔥', '💎', '🚀']" :key="emoji">
                                <button 
                                    type="button"
                                    @click="badgeForm.emoji = emoji"
                                    :class="{'bg-blue-100 border-2 border-blue-500': badgeForm.emoji === emoji, 'border-2 border-gray-300': badgeForm.emoji !== emoji}"
                                    class="p-2 text-2xl rounded transition hover:border-blue-500"
                                    x-text="emoji"
                                ></button>
                            </template>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                        <input 
                            x-model="badgeForm.description" 
                            type="text" 
                            required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="e.g., Excellent patient care"
                        >
                    </div>

                    <div class="flex gap-2">
                        <button 
                            type="button"
                            @click="showBadgeModal = false"
                            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition"
                        >
                            Cancel
                        </button>
                        <button 
                            type="submit"
                            :disabled="!badgeForm.emoji || !badgeForm.description"
                            class="flex-1 px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition disabled:opacity-50"
                        >
                            Send Badge
                        </button>
                    </div>

                    <div v-show="badgeError" class="bg-red-100 text-red-700 p-3 rounded text-sm">
                        <span x-text="badgeError"></span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function walletConnection() {
            return {
                walletAddress: null,
                connecting: false,

                async init() {
                    if (window.solana) {
                        try {
                            const resp = await window.solana.connect({ onlyIfTrusted: true });
                            this.walletAddress = resp.publicKey.toString();
                        } catch (err) {
                            console.log('Not auto-connecting');
                        }
                    }
                },

                async connect() {
                    if (!window.solana) {
                        alert('Please install Phantom wallet');
                        return;
                    }
                    try {
                        this.connecting = true;
                        const resp = await window.solana.connect();
                        this.walletAddress = resp.publicKey.toString();
                    } catch (err) {
                        alert('Failed to connect wallet: ' + err.message);
                    } finally {
                        this.connecting = false;
                    }
                },

                disconnect() {
                    if (window.solana) {
                        window.solana.disconnect();
                    }
                    this.walletAddress = null;
                },

                copy() {
                    navigator.clipboard.writeText(this.walletAddress);
                    alert('Address copied!');
                }
            };
        }

        function HealthCredApp() {
            return {
                form: {
                    fullName: '',
                    dateOfBirth: '',
                    email: '',
                    profession: '',
                    didDocument: ''
                },
                certForm: {
                    credentialId: '',
                    file: null
                },
                badgeForm: {
                    credentialId: '',
                    emoji: '⭐',
                    description: ''
                },
                credentials: [],
                pagination: { total: 0, limit: 10, offset: 0, hasMore: false },
                loading: false,
                registering: false,
                uploadingCert: false,
                showBadgeModal: false,
                registerError: '',
                certError: '',
                badgeError: '',
                walletAddress: '',

                async loadCredentials(offset = 0) {
                    this.loading = true;
                    try {
                        const res = await fetch(`/api/v1/healthcred/credentials?limit=10&offset=${offset}`);
                        const data = await res.json();
                        this.credentials = data.credentials;
                        this.pagination = data.pagination;
                    } catch (err) {
                        console.error('Error loading credentials:', err);
                    } finally {
                        this.loading = false;
                    }
                },

                async registerCredential() {
                    this.registerError = '';
                    const parentApp = this.$el.closest('[x-data]').__x_scope.__x_data;
                    const walletAddress = document.querySelector('[x-data*="walletConnection"]')?.__x_scope?.walletAddress;
                    
                    if (!walletAddress) {
                        this.registerError = 'Please connect your wallet first';
                        return;
                    }

                    this.registering = true;
                    try {
                        const res = await fetch('/api/v1/healthcred/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                walletAddress,
                                fullName: this.form.fullName,
                                dateOfBirth: this.form.dateOfBirth,
                                email: this.form.email,
                                profession: this.form.profession,
                                didDocumentJson: this.form.didDocument
                            })
                        });

                        if (!res.ok) {
                            const error = await res.json();
                            throw new Error(error.error || 'Registration failed');
                        }

                        const result = await res.json();
                        alert('Credential registered successfully!');
                        this.form = { fullName: '', dateOfBirth: '', email: '', profession: '', didDocument: '' };
                        this.loadCredentials();
                    } catch (err) {
                        this.registerError = err.message;
                    } finally {
                        this.registering = false;
                    }
                },

                submitRegistration() {
                    this.registerCredential();
                },

                onCertFileSelected(e) {
                    this.certForm.file = e.target.files[0];
                },

                async submitCertification() {
                    this.certError = '';
                    const walletAddress = document.querySelector('[x-data*="walletConnection"]')?.__x_scope?.walletAddress;
                    
                    if (!walletAddress) {
                        this.certError = 'Please connect your wallet first';
                        return;
                    }

                    if (!this.certForm.file) {
                        this.certError = 'Please select a file';
                        return;
                    }

                    this.uploadingCert = true;
                    try {
                        const fileBuffer = Buffer.from(await this.certForm.file.arrayBuffer());
                        const res = await fetch('/api/v1/healthcred/certifications', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                credentialId: this.certForm.credentialId,
                                issuerWallet: walletAddress,
                                filename: this.certForm.file.name,
                                fileBuffer: Array.from(fileBuffer),
                                fileSize: this.certForm.file.size,
                                fileType: this.certForm.file.type
                            })
                        });

                        if (!res.ok) {
                            const error = await res.json();
                            throw new Error(error.error || 'Upload failed');
                        }

                        alert('Certification uploaded successfully!');
                        this.certForm = { credentialId: '', file: null };
                    } catch (err) {
                        this.certError = err.message;
                    } finally {
                        this.uploadingCert = false;
                    }
                },

                async openBadgeModal(credentialId) {
                    this.badgeForm.credentialId = credentialId;
                    this.badgeForm.emoji = '⭐';
                    this.badgeForm.description = '';
                    this.badgeError = '';
                    this.showBadgeModal = true;
                },

                async submitBadge() {
                    this.badgeError = '';
                    const walletAddress = document.querySelector('[x-data*="walletConnection"]')?.__x_scope?.walletAddress;
                    
                    if (!walletAddress) {
                        this.badgeError = 'Please connect your wallet first';
                        return;
                    }

                    try {
                        const res = await fetch('/api/v1/healthcred/badges', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                credentialId: this.badgeForm.credentialId,
                                issuerWallet: walletAddress,
                                emoji: this.badgeForm.emoji,
                                description: this.badgeForm.description
                            })
                        });

                        if (!res.ok) {
                            const error = await res.json();
                            throw new Error(error.error || 'Badge creation failed');
                        }

                        alert('Badge sent successfully!');
                        this.showBadgeModal = false;
                    } catch (err) {
                        this.badgeError = err.message;
                    }
                },

                async viewCredentialDetails(credentialId) {
                    // Could expand this to show full details
                    try {
                        const res = await fetch(`/api/v1/healthcred/credentials/${credentialId}`);
                        const cred = await res.json();
                        alert(`${cred.full_name}\n${cred.profession}\n${cred.email}\nBadges: ${cred.badges_count}`);
                    } catch (err) {
                        alert('Error loading credential details');
                    }
                },

                init() {
                    this.loadCredentials();
                }
            };
        }
    </script>
</body>
</html>
